name: Publish to PyPI

# checkov:skip=CKV_GHA_7: dry_run is a constrained choice input used to route
# between TestPyPI and PyPI; no value flows into build/publish commands beyond
# an equality check.
# checkov:skip=CKV2_GHA_1: publish.yml is triggered by a version-tag push
# (`push: tags: v*`) or a manual `workflow_dispatch`. The tag-push trigger is
# scoped to `v*` tags only (not arbitrary branch pushes).
# The PyPI/TestPyPI publish jobs each declare `permissions: id-token: write` and
# nothing else (trusted publishing); the MCP-registry job adds `contents: read`
# so it can check out server.json, and uses id-token: write for OIDC auth to the
# registry. The build job runs with the default `contents: read`.

on:
  # A version-tag push is the SINGLE publish trigger. Cutting a release pushes
  # `vX.Y.Z`; the `github-release` job below then creates the GitHub Release from
  # the matching CHANGELOG section (previously a manual step that was missed for
  # 2026.7.21.1 and 2026.7.23.0, leaving the repo's Releases page stale). We do
  # NOT also trigger on `release: published` — if BOTH `push: tags`
  # and `release: published` triggered this workflow, each release fired it twice,
  # both runs uploaded the same files, and the loser failed with PyPI's
  # `400 File already exists`, leaving a spurious red run on every release (and
  # masking any genuine publish failure). Tag-push alone is sufficient and
  # reliable (see the historical note: it was added because release-only skipped
  # tag-only pushes). The publish step below ALSO sets skip-existing as a
  # belt-and-suspenders guard against any future duplicate fire.
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (upload to TestPyPI instead)"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    environment:
      name: pypi
      url: https://pypi.org/project/m3-memory/
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          # Idempotent: if a file for this version is already on PyPI (e.g. a
          # re-run, or a future duplicate trigger), skip it instead of failing
          # with `400 File already exists`. A publish never goes red just because
          # the artifact is already there.
          skip-existing: true

  publish-testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/m3-memory/
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@ba38be9e461d3875417946c167d0b5f3d385a247 # v1.14.1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-mcp-registry:
    name: Publish to MCP Registry
    # Runs AFTER PyPI: server.json's package entry points at the PyPI release, so
    # the package must exist first. Real tag pushes only (never the TestPyPI dry
    # run). If the PyPI job is skipped (dry_run), this is skipped too.
    needs: publish-pypi
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      id-token: write   # OIDC auth to the registry (namespace io.github.skynetcmd/*)
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry (OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json to the registry
        run: ./mcp-publisher publish

      # NOTE — 'isLatest' pitfall: the registry ranks "latest" by SemVer, and m3's
      # 4-part CalVer (e.g. 2026.7.21.0) is NON-semver, so a NEW publish does not
      # reliably become 'latest' if any VALID 3-part semver version still exists
      # in the server's history (it did once: 2026.4.7 held 'latest' until deleted).
      # This publish keeps the registry entry current; if 'latest' ever sticks on an
      # old version, the fix is a manual `mcp-publisher status --status deleted
      # <name> <old-semver-version>` (deprecate does NOT move isLatest). Full
      # runbook is in m3 memory: "RUNBOOK: fix MCP registry 'isLatest' stuck on an
      # old version" (memory_search it).
      - name: Report published version
        run: echo "Published ${GITHUB_REF#refs/tags/v} to the MCP registry. Verify 'latest' at https://registry.modelcontextprotocol.io/v0/servers?search=io.github.skynetcmd/m3-memory"

  github-release:
    name: Create the GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    # Real tag pushes only — never a dry-run workflow_dispatch (there is no tag
    # to attach a Release to, and TestPyPI runs must not mint public Releases).
    if: github.event_name == 'push'
    permissions:
      contents: write  # create a Release + upload the built artifacts to it
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Extract this version's CHANGELOG section
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          # Pull the body between this version's '## [x]' header and the next
          # '## [' header. If the section is missing, fall back to a stub rather
          # than failing the release.
          python - "$VERSION" > release_notes.md <<'PY'
          import re, sys, pathlib
          v = sys.argv[1]
          cl = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"^## \[{re.escape(v)}\][^\n]*\n(.*?)(?=^## \[)", cl, re.S | re.M)
          print(m.group(1).strip() if m else f"Release {v}. See CHANGELOG.md.")
          PY
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create the Release
        env:
          GH_TOKEN: ${{ github.token }}
          # Inject the version as an ENV var, not by interpolating ${{ }} into the
          # script text — GitHub expands run-block expressions BEFORE the shell
          # runs, so a crafted value could inject shell (zizmor template-injection).
          # Read as "$VERSION" below so it is a shell variable, not code.
          VERSION: ${{ steps.notes.outputs.version }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          TITLE=$(grep -m1 "^## \[${VERSION}\]" CHANGELOG.md \
                  | sed -E 's/^## \[[^]]*\] — [0-9-]+ — //' || true)
          [ -n "$TITLE" ] && TITLE="$TAG — $TITLE" || TITLE="$TAG"
          # Idempotent: if the Release already exists (manual pre-creation, re-run),
          # update its notes instead of failing.
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --notes-file release_notes.md --latest
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" --notes-file release_notes.md --verify-tag --latest \
              dist/*
          fi

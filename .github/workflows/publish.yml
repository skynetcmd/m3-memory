name: Publish to PyPI

# checkov:skip=CKV_GHA_7: dry_run is a constrained choice input used to route
# between TestPyPI and PyPI; no value flows into build/publish commands beyond
# an equality check.
# checkov:skip=CKV2_GHA_1: publish.yml is triggered by a version-tag push
# (`push: tags: v*`) or a manual `workflow_dispatch`. The tag-push trigger is
# scoped to `v*` tags only (not arbitrary branch pushes).
# The two publish jobs each declare `permissions: id-token: write` and nothing
# else (trusted publishing to PyPI/TestPyPI); the build job runs with the
# default `contents: read` set at the workflow level.

on:
  # A version-tag push is the SINGLE publish trigger. Cutting a release pushes
  # `vX.Y.Z` and (usually) also creates a GitHub Release — if BOTH `push: tags`
  # and `release: published` triggered this workflow, each release fired it twice,
  # both runs uploaded the same files, and the loser failed with PyPI's
  # `400 File already exists`, leaving a spurious red run on every release (and
  # masking any genuine publish failure). Tag-push alone is sufficient and
  # reliable (see the historical note: it was added because release-only skipped
  # tag-only pushes). The publish step below ALSO sets skip-existing as a
  # belt-and-suspenders guard against any future duplicate fire.
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (upload to TestPyPI instead)"
        required: false
        type: choice
        default: "false"
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'false')
    environment:
      name: pypi
      url: https://pypi.org/project/m3-memory/
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # Idempotent: if a file for this version is already on PyPI (e.g. a
          # re-run, or a future duplicate trigger), skip it instead of failing
          # with `400 File already exists`. A publish never goes red just because
          # the artifact is already there.
          skip-existing: true

  publish-testpypi:
    name: Publish to TestPyPI (dry run)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/m3-memory/
    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

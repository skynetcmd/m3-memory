# Regenerate docs/star-history.svg from the GitHub stargazers API and commit it
# back to main. GitHub now gates star data behind an authenticated token, so the
# anonymous star-history.com embed no longer renders in the README.
#
# IMPORTANT — token: as of 2026-06-30 GitHub limits the stargazers endpoint to a
# repo's own admins/collaborators. The built-in GITHUB_TOKEN is an installation
# token that is NOT treated as an admin/collaborator, so it returns 403 on the
# stargazers `starred_at` data. This workflow therefore uses a repo secret,
# M3_STARGAZER — a fine-grained PAT owned by an admin, with only
# "Metadata: read-only" permission on this repo. Create it at
# https://github.com/settings/tokens?type=beta and add it under
# Settings -> Secrets and variables -> Actions -> New repository secret.
# Until that secret exists the job no-ops (it will not fail the Actions tab).
#
# The generator is idempotent: with no new stars it produces a byte-identical
# SVG, so the commit step is a no-op and no empty commit is created.

# This workflow also refreshes the README download badges (PyPI + GitHub clones)
# via bin/gen_download_badges.py — same schedule, same commit-back. The PyPI count
# needs no token; the GitHub unique-clone count uses the same M3_STARGAZER PAT
# (the traffic API, like the stargazers API, is admin/collaborator-only, so the
# built-in GITHUB_TOKEN returns 403). Both badges are shields "endpoint" JSON
# committed under docs/badges/, so shields renders the number we control.

name: Star history

on:
  schedule:
    - cron: "17 6 * * 1"   # weekly, Mondays 06:17 UTC
  workflow_dispatch: {}     # manual trigger from the Actions tab

# Default workflow token permission in this repo is read-only; the commit-back
# needs contents: write.
permissions:
  contents: write

concurrency:
  group: star-history
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate star-history.svg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Check for star-history token
        id: token
        env:
          M3_STARGAZER: ${{ secrets.M3_STARGAZER }}
        run: |
          if [ -z "$M3_STARGAZER" ]; then
            echo "M3_STARGAZER secret is not set — skipping star-history refresh."
            echo "The built-in GITHUB_TOKEN cannot read the stargazers endpoint"
            echo "(GitHub restricts it to admins/collaborators). Add a fine-grained"
            echo "PAT with Metadata:read as the M3_STARGAZER secret to enable."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate star-history.svg
        if: steps.token.outputs.present == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.M3_STARGAZER }}
        run: python bin/gen_star_history.py --repo "${{ github.repository }}" --out docs/star-history.svg

      # Refresh the README download badges (PyPI total + GitHub unique clones).
      # Runs even when the star token is absent: the PyPI count needs no token,
      # and the generator skips the clone badge gracefully without one. When the
      # M3_STARGAZER PAT IS present it's passed as GITHUB_TOKEN so the (admin-only)
      # traffic API resolves and the running clone total accumulates.
      - name: Refresh download badges
        env:
          GITHUB_TOKEN: ${{ secrets.M3_STARGAZER }}
        run: python bin/gen_download_badges.py --repo "${{ github.repository }}" --package m3-memory

      - name: Commit if changed
        run: |
          # Stage every asset either generator may have touched; commit only if
          # something actually changed (idempotent — no empty commits).
          git add docs/star-history.svg docs/badges/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No badge/chart changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(badges): refresh star history + download counts [skip ci]"
          git push

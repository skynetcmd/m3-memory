[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "m3-memory"
version = "2026.4.17"
description = "Local-first persistent memory for MCP agents — 46 tools, 89% LongMemEval, hybrid search, GDPR, zero cloud"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "skynetcmd", email = "skynetcmd@users.noreply.github.com" }
]
keywords = [
    "mcp",
    "model-context-protocol",
    "agentic-memory",
    "local-llm",
    "claude",
    "gemini",
    "rag",
    "vector-search",
    "sqlite",
    "gdpr",
    "ai-agents",
    "ollama",
    "contradiction-detection",
    "bitemporal",
    "local-first",
    "multi-agent",
    "knowledge-graph",
    "persistent-memory",
    "longmemeval",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
    "Environment :: Console",
    "Typing :: Typed",
]
dependencies = [
    "fastmcp>=3.2,<4",
    "mcp>=1.3,<2",
    "httpx[http2]>=0.28,<1",
    "requests>=2.33,<3",
    "psycopg2-binary>=2.9,<3",
    "chromadb-client>=0.6,<1",
    "cryptography>=46.0,<47",
    "keyring>=25.7,<26",
    "numpy>=1.22.5,<2.0.0",
    "python-dotenv>=1.2,<2",
    "PyYAML>=6.0,<7",
    "psutil>=7.2,<8",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.2,<4"]
dev = [
    "pytest>=9.0,<10",
    "pytest-asyncio>=1.3,<2",
    "ruff>=0.9,<1",
    "mypy>=1.15,<2",
    "types-requests",
    "types-setuptools",
    "twine>=6.0,<7",
    "build>=1.2,<2",
]

[project.scripts]
mcp-memory = "m3_memory.cli:main"
m3-team = "m3_memory.team_cli:main"

[project.urls]
Homepage = "https://github.com/skynetcmd/m3-memory"
Repository = "https://github.com/skynetcmd/m3-memory"
"Bug Tracker" = "https://github.com/skynetcmd/m3-memory/issues"
Changelog = "https://github.com/skynetcmd/m3-memory/blob/main/CHANGELOG.md"
Documentation = "https://github.com/skynetcmd/m3-memory/blob/main/AGENT_INSTRUCTIONS.md"

[tool.setuptools.packages.find]
where = ["."]
include = ["m3_memory*"]

[tool.setuptools.package-data]
m3_memory = [
    "bin/*.py",
    "memory/migrations/*.sql",
    "mcp.json.example",
    "mcp-server.json",
]

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "m3-memory"
version = "2026.4.6"
description = "Local-first agentic memory layer for MCP agents — 25 tools, hybrid search, GDPR, no cloud"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [
    { name = "skynetcmd", url = "https://github.com/skynetcmd" }
]
keywords = [
    "mcp",
    "model-context-protocol",
    "agentic-memory",
    "local-llm",
    "claude",
    "gemini",
    "rag",
    "vector-search",
    "sqlite",
    "gdpr",
    "ai-agents",
    "ollama",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/skynetcmd/m3-memory"
Repository = "https://github.com/skynetcmd/m3-memory"
"Bug Tracker" = "https://github.com/skynetcmd/m3-memory/issues"
Changelog = "https://github.com/skynetcmd/m3-memory/blob/main/CHANGELOG.md"

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

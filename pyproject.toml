[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "m3-memory"
version = "2026.4.22.2"
description = "Local-first persistent memory for MCP agents — 66 tools, 89% LongMemEval, hybrid search, GDPR, zero cloud"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.11"
authors = [
    { name = "skynetcmd", email = "skynetcmd@users.noreply.github.com" },
    { name = "Gemini CLI", email = "gemini-cli@google.com" }
]
keywords = [
    "mcp",
    "model-context-protocol",
    "agentic-memory",
    "local-llm",
    "claude",
    "gemini",
    "rag",
    "vector-search",
    "sqlite",
    "gdpr",
    "ai-agents",
    "ollama",
    "contradiction-detection",
    "bitemporal",
    "local-first",
    "multi-agent",
    "knowledge-graph",
    "persistent-memory",
    "longmemeval",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
    "Environment :: Console",
    "Typing :: Typed",
]
dependencies = [
    "fastmcp>=3.2.4,<4",
    "mcp>=1.27.0,<2",
    "httpx[http2]>=0.28.1,<1",
    "requests>=2.33.1,<3",
    "psycopg2-binary>=2.9.11,<3",
    "chromadb-client>=1.5.7,<2",
    "cryptography>=46.0.7,<47",
    "keyring>=25.7.0,<26",
    "numpy>=2.4.4,<3",
    "python-dotenv>=1.2.2,<2",
    "PyYAML>=6.0.3,<7",
    "psutil>=7.2.2,<8",
]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.2.0,<4"]
dev = [
    "pytest>=9.0.3,<10",
    "pytest-asyncio>=1.3.0,<2",
    "ruff>=0.15.10,<1",
    "mypy>=1.20.1,<2",
    "types-requests>=2.33.0.20260408",
    "types-setuptools>=82.0.0.20260408",
    "twine>=6.2.0,<7",
    "build>=1.4.2,<2",
]

[project.scripts]
mcp-memory = "m3_memory.cli:main"
m3-team = "m3_memory.team_cli:main"

[project.urls]
Homepage = "https://github.com/skynetcmd/m3-memory"
Repository = "https://github.com/skynetcmd/m3-memory"
"Bug Tracker" = "https://github.com/skynetcmd/m3-memory/issues"
Changelog = "https://github.com/skynetcmd/m3-memory/blob/main/docs/CHANGELOG.md"
Documentation = "https://github.com/skynetcmd/m3-memory/blob/main/docs/AGENT_INSTRUCTIONS.md"

[tool.setuptools.packages.find]
where = ["."]
include = ["m3_memory*"]

[tool.setuptools.package-data]
m3_memory = [
    "bin/*.py",
    "memory/migrations/*.sql",
    "mcp.json.example",
    "mcp-server.json",
]

[tool.ruff]
target-version = "py311"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
# E501: long lines handled by editor wrap, not blocker for this codebase.
# E402: many bin/ entrypoints do sys.path setup or lazy imports deliberately
#   before importing project modules — buried imports are intentional.
# E701/E702: one-liner `if x: return` / `try: foo` is used throughout bench
#   and ingest scripts as a terseness choice; not a readability problem here.
ignore = ["E501", "E402", "E701", "E702"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
# Match the codebase's pre-PEP 484 style: `def f(x: str = None)` means Optional.
implicit_optional = true
# False positives from narrowing around None checks are noisy in legacy code
# that still leans on runtime checks rather than type guards.
strict_optional = false
# warn_unused_ignores off globally because per-file overrides below use
# ignore_errors = true (which trips this warning on real # type: ignore lines
# elsewhere in those modules). Revisit if we get the legacy files typed.
warn_unused_ignores = false

# ── Per-module overrides ──────────────────────────────────────────────────────
# memory_bridge.py exposes every tool from mcp_tool_catalog at import time via
# `globals()[name] = fn`. Mypy can't see these, so any module that imports a
# tool-shaped name from memory_bridge will light up with attr-defined errors
# (~55 of 184 total). The registration pattern is load-bearing — refactoring
# to an explicit registry would touch every call site across bin/ and memory/.
# Silence the false-positive class by not checking memory_bridge itself and
# ignoring attr-defined on its importers.
[[tool.mypy.overrides]]
module = "memory_bridge"
ignore_errors = true

# Legacy untyped modules — typing them is a separate project, not a CI gate.
# Each file listed here has >3 errors that aren't real bugs, just missing
# annotations on params/returns or loose dict/list unions. Trim this list as
# modules get typed.
[[tool.mypy.overrides]]
module = [
    "test_memory_bridge",
    "memory_core",
    "m3_sdk",
    "bench_locomo",
    "chatlog_core",
    "agent_protocol",
    "chatlog_init",
    "knowledge_helpers",
    "mission_control",
    "chatlog_redaction",
    "temporal_utils",
    "debug_agent_bridge",
    "setup_secret",
    "migrate_flat_memory",
    "chatlog_ingest",
    "aider_patch",
    "test_mission_control",
    "news_fetcher",
    "mcp_proxy",
    "custom_tool_bridge",
    "embed_agent_instructions",
    "chroma_sync_cli",
]
ignore_errors = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "slow: long-running tests (>1s); use -m 'not slow' to skip",
]

[tool.bandit]
exclude_dirs = ["tests", "benchmarks", ".venv", "venv"]
# B101: asserts in tests are expected.
# B404: every bin/ tool that shells out imports `subprocess`; the import itself
#   isn't a vulnerability, only specific call patterns are.
# B110: try/except/pass is idiomatic in the bridge/daemon fail-open paths in
#   this repo. Individual cases that hide real bugs are addressed via code
#   review, not by flagging every swallow.
# B112: try/except/continue — same reasoning as B110.
# B603: subprocess call with shell=False and a static argv list is safe here;
#   all subprocess targets in bin/ are OS binaries (git, security, lsof, etc.)
#   invoked with non-user-controllable args. Call sites that take user input
#   are already audited.
# B607: partial executable paths ("git", "docker") rely on $PATH, which in
#   our user-facing CLI context is acceptable. Hardened deployments should
#   set absolute paths via env.
# B608: f-string SQL construction in this repo only ever inlines generated
#   `?` placeholder lists or static column names — all user values reach the
#   DB through the parameter tuple. Bandit's regex can't distinguish safe
#   from unsafe f-string SQL; code review catches new unsafe sites.
skips = ["B101", "B110", "B112", "B404", "B603", "B607", "B608"]

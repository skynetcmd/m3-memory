[build-system]
requires = ["setuptools>=70", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "m3-memory"
version = "2026.4.7"
description = "Local-first agentic memory layer for MCP agents — 25 tools, hybrid search, GDPR, no cloud"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "skynetcmd" }
]
keywords = [
    "mcp",
    "model-context-protocol",
    "agentic-memory",
    "local-llm",
    "claude",
    "gemini",
    "rag",
    "vector-search",
    "sqlite",
    "gdpr",
    "ai-agents",
    "ollama",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Operating System :: OS Independent",
]

[project.urls]
Homepage = "https://github.com/skynetcmd/m3-memory"
Repository = "https://github.com/skynetcmd/m3-memory"
"Bug Tracker" = "https://github.com/skynetcmd/m3-memory/issues"
Changelog = "https://github.com/skynetcmd/m3-memory/blob/main/CHANGELOG.md"

[tool.setuptools]
packages = []
include-package-data = false

[tool.setuptools.data-files]
"m3_memory/bin" = [
    "bin/memory_bridge.py",
    "bin/llm_failover.py",
    "bin/auth_utils.py",
    "bin/embedding_utils.py",
    "bin/grok_bridge.py",
    "bin/web_research_bridge.py",
    "bin/debug_agent_bridge.py",
    "bin/custom_tool_bridge.py",
    "bin/mcp_proxy.py",
]
"m3_memory/memory/migrations" = [
    "memory/migrations/001_initial_schema.sql",
    "memory/migrations/002_enforce_relationships.sql",
    "memory/migrations/003_encrypted_secrets.sql",
    "memory/migrations/004_archive_db.sql",
    "memory/migrations/005_perf_and_wal.sql",
]
"m3_memory" = [
    "mcp.json.example",
    "mcp-server.json",
    "ARCHITECTURE.md",
    "requirements.txt",
]

[tool.ruff]
target-version = "py311"
line-length = 120
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

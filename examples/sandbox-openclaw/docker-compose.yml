services:
  openclaw:
    build: .
    container_name: openclaw-sandbox
    ports:
      - "8000:18789"
    volumes:
      - ./shared:/shared
      - ./.openclaw:/home/clawuser/.openclaw
      - ../AGENT_INSTRUCTIONS.md:/shared/AGENT_INSTRUCTIONS.md:ro
    env_file: .env
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    command: ["--token", "${OPENCLAW_GATEWAY_TOKEN}"]
    deploy:
      resources:
        limits:
          memory: 4G

<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Brand Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>

    <!-- Premium Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>

    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A1030;stop-opacity:1" />
    </linearGradient>

    <!-- Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
      <feOffset dx="2" dy="3" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gold Glow -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur" />
      <feFlood flood-color="#F59E0B" flood-opacity="0.7" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Neural path glow -->
    <filter id="pathGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="80" ry="80" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern for depth -->
  <g opacity="0.06" stroke="#7C72FF" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
  </g>

  <!-- Neural path icon — centered, large -->
  <g transform="translate(131, 130)" filter="url(#pathGlow)">
    <path d="M10 200 L62 40 L114 140 L166 40 L218 200"
          fill="none" stroke="url(#grad1)" stroke-width="18"
          stroke-linecap="round" stroke-linejoin="round" />
    <!-- Nodes -->
    <circle cx="10"  cy="200" r="14" fill="#4F46E5" filter="url(#shadow)" />
    <circle cx="62"  cy="40"  r="14" fill="#6366F1" filter="url(#shadow)" />
    <circle cx="114" cy="140" r="14" fill="#8B5CF6" filter="url(#shadow)" />
    <circle cx="166" cy="40"  r="14" fill="#D946EF" filter="url(#shadow)" />
    <circle cx="218" cy="200" r="14" fill="#EC4899" filter="url(#shadow)" />
  </g>

  <!-- M3 text -->
  <text x="256" y="400"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="96"
        font-weight="900"
        fill="url(#goldGrad)"
        filter="url(#goldGlow)">M3</text>

  <!-- Tagline -->
  <text x="256" y="450"
        text-anchor="middle"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="22"
        font-weight="400"
        fill="#9CA3AF"
        letter-spacing="3">MEMORY</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 490">
  <!-- Terminal window -->
  <rect fill="#0d1117" width="850" height="490" rx="10"/>
  <rect fill="#161b22" width="850" height="38" rx="10"/>
  <rect fill="#161b22" y="28" width="850" height="10"/>
  <circle fill="#ff5f57" cx="20" cy="19" r="7"/>
  <circle fill="#febc2e" cx="42" cy="19" r="7"/>
  <circle fill="#28c840" cx="64" cy="19" r="7"/>
  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="13" x="425" y="24" text-anchor="middle">M3 Memory — Contradiction Detection</text>

  <!-- Step 1: First write -->
  <text fill="#7ee787" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="72">$</text>
  <text fill="#e6edf3" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="72">memory_write "API server runs on port 8080"</text>

  <text fill="#3fb950" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="100">&#10003;</text>
  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="100">Created: a1b2c3d4  type=fact  title="API server port"</text>

  <!-- Step 2: Conflicting write -->
  <text fill="#7ee787" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="148">$</text>
  <text fill="#e6edf3" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="148">memory_write "API server moved to port 9000"</text>

  <text fill="#d29922" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="176">&#9888;</text>
  <text fill="#d29922" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="176">Contradiction detected with memory a1b2c3d4</text>

  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="204">  Old: "API server runs on port 8080"</text>
  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="228">  New: "API server moved to port 9000"</text>
  <text fill="#58a6ff" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="256">  &#8594; Old memory superseded. Relationship: supersedes</text>
  <text fill="#3fb950" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="284">&#10003;</text>
  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="284">Created: e5f6g7h8  type=fact  title="API server port"</text>

  <!-- Step 3: Search proves it works -->
  <text fill="#7ee787" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="332">$</text>
  <text fill="#e6edf3" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="332">memory_search "what port is the API on?"</text>

  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="360">  #1  score=0.94  [e5f6g7h8]  type=fact</text>
  <text fill="#e6edf3" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="388">  "API server moved to port 9000"</text>
  <text fill="#484f58" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="416">  supersedes: a1b2c3d4 (port 8080) — 2026-04-11</text>

  <!-- Summary -->
  <text fill="#3fb950" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="464">&#10003;</text>
  <text fill="#3fb950" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="36" y="464">Port 9000. History preserved. Zero manual cleanup.</text>
</svg>

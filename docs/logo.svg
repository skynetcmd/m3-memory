<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary Brand Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Premium Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>

    <!-- Standard Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Gold Glow Filter -->
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur" />
      <feFlood flood-color="#F59E0B" flood-opacity="0.6" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Master Container: Perfectly Centered -->
  <g transform="translate(400, 100)">
    
    <!-- Icon: Neural Path (Distinct separation) -->
    <g transform="translate(-280, -60)" filter="url(#shadow)">
      <path d="M10 120 L40 20 L70 80 L100 20 L130 120" fill="none" stroke="url(#grad1)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="10" cy="120" r="8" fill="#4F46E5" />
      <circle cx="40" cy="20" r="8" fill="#6366F1" />
      <circle cx="70" cy="80" r="8" fill="#8B5CF6" />
      <circle cx="100" cy="20" r="8" fill="#D946EF" />
      <circle cx="130" cy="120" r="8" fill="#EC4899" />
    </g>

    <!-- Text Group: Aligned to stay clear of the icon -->
    <g transform="translate(60, 0)">
      <!-- Main Title -->
      <text text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="64" font-weight="800">
        <tspan fill="url(#goldGrad)" filter="url(#goldGlow)">M3</tspan> 
        <tspan fill="#1F2937"> </tspan>
        <tspan fill="url(#grad1)">Memory</tspan>
      </text>
      
      <!-- Subtitle (Justified to match title width) -->
      <text y="40" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="400" fill="#4B5563" textLength="340" lengthAdjust="spacing">
        Intelligent Agentic Memory
      </text>
    </g>
  </g>
</svg>

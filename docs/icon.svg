<svg width="160" height="110" viewBox="0 0 160 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Neural Path Gradient -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    
    <!-- Gold Gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FDE68A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B45309;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle Glow for the 3 (Tightened region) -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur" />
      <feFlood flood-color="#F59E0B" flood-opacity="0.5" result="flood" />
      <feComposite in="flood" in2="blur" operator="in" result="glow" />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Neural Path "M" - Base is exactly at y=110 -->
  <path d="M10 105 L35 25 L60 75 L85 25 L110 105" fill="none" stroke="url(#grad1)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="10" cy="105" r="5" fill="#4F46E5" />
  <circle cx="35" cy="25" r="5" fill="#6366F1" />
  <circle cx="60" cy="75" r="5" fill="#8B5CF6" />
  <circle cx="85" cy="25" r="5" fill="#D946EF" />
  <circle cx="110" cy="105" r="5" fill="#EC4899" />

  <!-- Superscript Gold "3" -->
  <text x="115" y="45" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="900" fill="url(#goldGrad)" filter="url(#goldGlow)">
    3
  </text>
</svg>

<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient for M -->
    <linearGradient id="gradM" x1="0" y1="0" x2="512" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A3D91"/>
      <stop offset="50%" stop-color="#1F7AE0"/>
      <stop offset="100%" stop-color="#1FC47A"/>
    </linearGradient>

    <!-- Gold gradient for 3 -->
    <linearGradient id="gradGold" x1="0" y1="0" x2="0" y2="100%">
      <stop offset="0%" stop-color="#FFF3B0"/>
      <stop offset="40%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#C89B00"/>
    </linearGradient>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background (Discord-friendly) -->
  <rect width="512" height="512" rx="256" fill="#0B0F14"/>

  <!-- Stylized M (open right side) -->
  <path
    d="M140 360 L140 150 L200 150 L260 280 L320 150 L380 150 L380 360 L320 360 L320 240 L260 360 L200 240 L200 360 Z"
    fill="url(#gradM)"
    filter="url(#shadow)"
  />

  <!-- Superscript 3 -->
  <text
    x="350"
    y="160"
    font-size="90"
    font-family="Inter, Arial, sans-serif"
    font-weight="700"
    fill="url(#gradGold)"
    filter="url(#shadow)"
  >
    3
  </text>
</svg>
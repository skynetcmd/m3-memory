  <text fill="#8b949e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="13" x="425" y="24" text-anchor="middle">M3 Memory — Cross-Device, Cross-Platform Sync</text>

  <!-- MacBook section -->

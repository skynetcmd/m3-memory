  <!-- Sync indicator -->
  <text fill="#f0883e" font-family="SF Mono,Cascadia Code,Consolas,monospace" font-size="14" x="20" y="186">&#8635; Sync: SQLite &#8594; PostgreSQL  (delta: 1 new, 0 updated)</text>

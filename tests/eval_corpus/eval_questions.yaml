# Eval Q-A pairs for the files_memory phase-1 retrieval gate.
#
# Each entry:
#   q             — the user question
#   expect_text   — a phrase that MUST appear in the top-N leaf result text
#   expect_file   — optionally, the filename that should hold the answer
#   topn          — how many results to check (default 5)
#
# Pass criterion: ≥ 80% of questions return a top-N hit containing
# `expect_text`. Used by tests/eval_files_ingest.py.


# Default entity-graph vocabulary for m3-memory — SUPERSET (2026-05-03).
#
# This YAML is the SCHEMA-VALIDATION DEFAULT. It is the union of the two
# narrower domain vocabs:
#
#   * entity_graph_v2.yaml  — human-life vocab (chatlog, persona-grounded
#                              benchmark corpora)
#   * entity_graph_m3.yaml  — technical vocab (homelab inventory, code
#                              structure, bench/ML run records)
#
# Why a superset: a single SQLite memory DB may hold rows from both domains
# (e.g. agent_memory.db, when chatlog content gets promoted into the same
# DB that already holds homelab/code observations). The schema validator
# needs to accept any predicate or entity_type emitted by either domain's
# extractor without rejecting cross-domain content.
#
# At EXTRACTION time, callers should still load the narrower domain vocab:
#
#   M3_ENTITY_VOCAB_YAML=config/lists/entity_graph_v2.yaml  python ...   # human-life content
#   M3_ENTITY_VOCAB_YAML=config/lists/entity_graph_m3.yaml  python ...   # technical content
#
# This keeps each extractor's prompt focused on a small relevant vocab
# while the schema accepts the union.
#
# Contents — by domain layer:
#
#   ─── Cross-domain (provenance + change) ───
#     mentions, same_as, source_of, supersedes
#
#   ─── Human-life Layer 2 (stable person attributes) ───
#     located_in, works_at, family_of, knows, prefers, owns
#
#   ─── Human-life Layer 3 (event/object attributes) ───
#     has_participant, has_location, has_time, has_quantity
#
#   ─── Human-life legacy (preserved-but-deprecated) ───
#     before, after  predicates
#     legacy_concept, legacy_object  types
#
#   ─── Technical infrastructure ───
#     runs_on, hosts, listens_on, assigned_ip, on_vlan, fails_over_to
#
#   ─── Technical code structure ───
#     defined_in, imports, calls
#
#   ─── Technical provenance ───
#     references, introduced_in, deprecates
#
#   ─── Technical bench/ML ───
#     measured_on, uses_model, judged_by, produced_artifact, affects_category
#
#   ─── Technical human signals ───
#     authorizes_budget
#
# Note: 'contradicts' from v1 is intentionally NOT in this superset. v1 rows
# using 'contradicts' are migrated to 'supersedes' by bin/migrate_entity_vocab.py.

entity_types:
  # ── Active human-life vocab (v2) ──
  - person
  - place
  - organization
  - event
  - date
  - quantity
  - preference
  - product
  - topic

  # ── Human-life legacy (preserved-but-deprecated) ──
  - legacy_concept
  - legacy_object

  # ── Technical: homelab infrastructure (m3) ──
  - host
  - container
  - service
  - device
  - ip_address
  - vlan
  - port
  - mac_address
  - endpoint_url
  - firewall_rule

  # ── Technical: code + software engineering (m3) ──
  - file_path
  - function
  - class_or_table
  - cli_flag
  - env_var
  - module
  - commit_or_branch
  - migration

  # ── Technical: benchmark + ML (m3) ──
  - benchmark
  - model
  - variant
  - metric
  - dataset_field
  - bench_artifact
  - task_category
  - bench_run_id

  # ── Technical: memory-system primitives (m3) ──
  - memory_id
  - memory_type
  - task_id

  # ── Technical: misc (m3) ──
  - protocol
  - datetime

entity_predicates:
  # ── Cross-domain: provenance/aliasing ──
  - mentions
  - same_as
  - source_of

  # ── Cross-domain: change ──
  - supersedes

  # ── Human-life Layer 2: stable person attributes ──
  - located_in
  - works_at
  - family_of
  - knows
  - prefers
  - owns

  # ── Human-life Layer 3: event/object attributes ──
  - has_participant
  - has_location
  - has_time
  - has_quantity

  # ── Human-life legacy (preserved-but-deprecated) ──
  - before
  - after

  # ── Technical infrastructure topology (m3) ──
  - runs_on
  - hosts
  - listens_on
  - assigned_ip
  - on_vlan
  - fails_over_to

  # ── Technical code structure (m3) ──
  - defined_in
  - imports
  - calls

  # ── Technical provenance (m3) ──
  - references
  - introduced_in
  - deprecates

  # ── Technical bench/ML (m3) ──
  - measured_on
  - uses_model
  - judged_by
  - produced_artifact
  - affects_category

  # ── Technical human signals (m3) ──
  - authorizes_budget

metadata:
  description: "Default schema-validation superset (union of human-life v2 + technical m3 vocabs)"
  domain: "all (cross-domain superset)"
  version: "default-2026-05-03"
  applies_to: "schema validation in DBs that may hold both human-life and technical content"
  v2_yaml: "config/lists/entity_graph_v2.yaml — narrower vocab for extractors processing human-life content"
  m3_yaml: "config/lists/entity_graph_m3.yaml — narrower vocab for extractors processing technical content"
  v1_migration: "bin/migrate_entity_vocab.py renames v1 'concept'/'object' types and 'relates_to'/'contradicts' predicates to v2-equivalent values"

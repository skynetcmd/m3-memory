# enrich_google_gemini_3_flash_lite.yaml — Gemini 3.1 Flash-Lite (cheapest 2026 frontier)
#
# Use when: large-scale enrichment runs where cost matters and quality
#   needs to beat the 8B local fallback. Released April 2026, priced
#   below 2.5 Flash but reportedly faster.
# Cost:     $0.25/M input, $1.50/M output (list prices, 2026-04)
#           ~$0.00078 per call (700 in + 400 out)
#           ~$0.78 per 1000 conversations
#           Per 221k-conv full run: ~$172
# Wall:     ~2s per call serial; with concurrency=50 and a 100k-call
#           corpus, ~1 hour wallclock.
# Quality:  Google positions Flash-Lite as cheaper-than-2.5-Flash with
#           comparable JSON adherence. Validate on a 50-row sample
#           before committing to a full run.
#
# Required env vars:
#   GEMINI_API_KEY     — Google AI Studio key
#                        (https://aistudio.google.com/apikey)
#
# Required setup:
#   export GEMINI_API_KEY=AIza...
#   python bin/m3_enrich.py --profile enrich_google_gemini_3_flash_lite
#
# Switch to higher quality / per-token cost: enrich_google_gemini_3_flash.yaml
# Switch to no-cost: enrich_local_qwen.yaml (requires LM Studio + qwen3-8b)

url: https://generativelanguage.googleapis.com/v1beta/openai/chat/completions
model: gemini-3.1-flash-lite-preview
api_key_service: GEMINI_API_KEY
backend: openai
cache_system: false
temperature: 0
timeout_s: 30.0
max_tokens: 1024
input_max_chars: 6000
# Pricing per Google list (gemini-3.1-flash-lite-preview, 2026-04):
# $0.25 / 1M input tokens, $1.50 / 1M output tokens. Used by
# run_observer to compute cost_usd from prompt/completion tokens
# (Gemini's OAI-compat endpoint returns prompt/completion_tokens but
# no native cost field). Drives --budget-usd and per-row provenance.
input_cost_per_mtok: 0.25
output_cost_per_mtok: 1.50
labels:
  - observed
fallback: observed
post:
  format: "{text}"
system: |
  You are an Observer. You read a chat session between a user and an assistant
  and emit a JSON list of atomic observations about the user. Each observation
  records WHAT was said, WHEN the assistant logged it, and WHEN it actually
  happened.

  Output ONLY a JSON object — no preamble, no code fences, no commentary:

    {"observations": [
      {
        "text": "User's son Jack started kindergarten.",
        "observation_date": "2024-09-12",
        "referenced_date": "2024-09-04",
        "relative_date": "last Wednesday",
        "confidence": 0.95,
        "supersedes_hint": null
      }
    ]}

  Field rules:
  1. text — a single declarative statement about the USER, with pronouns
     resolved ("user", not "I"). One fact per observation. Skip assistant
     utterances, questions, hypotheticals, jokes, and acknowledgments.

     SKIP low-value chat noise. Do NOT emit observations for status /
     location queries ("what's the status?", "where are you?"),
     acknowledgments ("ok", "thanks", "got it"), pleasantries, process
     talk ("let me run that", "give me a sec"), tool self-reports
     ("build succeeded"), or repeated phrasings of the same fact within
     the session. If a turn contains ONLY this kind of content, return
     {"observations": []} for that turn.

     EXTRACT EVERY ATOMIC FACT that IS substantive. Process each user
     turn independently and emit one observation for EACH fact, including
     each event, duration, count, entity, preference, and state-change
     separately.
  2. observation_date — copy the session_date from the input. ISO-8601.
  3. referenced_date — the calendar date the fact is ABOUT, resolved from
     session_date + any relative phrasing. ISO-8601. NULL when timeless.
  4. relative_date — verbatim user phrasing ("yesterday", "last Thursday").
     NULL when no relative phrasing was used.
  5. confidence — 0.95 for explicit user statements, 0.7 for inferences,
     < 0.6 means do not emit.
  6. supersedes_hint — short string of any contradicted earlier statement
     in the SAME session, otherwise null.

  Edge cases: empty list when no user-facts; null referenced_date for
  ambiguous phrases; future dates resolved; same-session contradictions
  emit both with supersedes_hint on the later.

  Output JSON ONLY. No markdown. No prose.

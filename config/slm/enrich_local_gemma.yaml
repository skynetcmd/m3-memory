# enrich_local_gemma.yaml — Lightweight local profile (LM Studio + gemma-4-coder)
#
# Use when: you want enrichment to be FAST and have less compute headroom.
# Cost:     $0
# Wall:     ~1s per conversation (3x faster than qwen3-8b)
# Quality:  good for direct-recall facts ("user went to Paris");
#           weaker on multi-session synthesis ("how many camping days total?").
#           In replay testing, gemma-4-coder fixed 13/52 A1 failures vs
#           qwen3-8b's 13/52 — same count, different distribution. Gemma
#           wins on KU/ss-assistant recall, qwen wins on multi-session sums.
#
# Required env vars:
#   LM_API_TOKEN     — any string; LM Studio just needs it present
#
# Required setup:
#   1. LM Studio with gemma-4-coder loaded
#   2. python bin/m3_enrich.py --profile enrich_local_gemma
#
# Switch to higher quality: see enrich_local_qwen.yaml (3x slower but better
#   on multi-session synthesis facts)
# Switch to cloud: see enrich_anthropic_haiku.yaml

url: http://127.0.0.1:1234/v1/messages
model: gemma-4-coder
api_key_service: LM_API_TOKEN
backend: anthropic
anthropic_version: "2023-06-01"
cache_system: false
temperature: 0
timeout_s: 60.0
max_tokens: 2048
input_max_chars: 20000
labels:
  - observed
fallback: observed
post:
  format: "{text}"
system: |
  You are an Observer. You read a chat session between a user and an assistant
  and emit a JSON list of atomic observations about the user. Each observation
  records WHAT was said, WHEN the assistant logged it, and WHEN it actually
  happened.

  Output ONLY a JSON object — no preamble, no code fences, no commentary:

    {"observations": [
      {
        "text": "User's son Jack started kindergarten.",
        "observation_date": "2024-09-12",
        "referenced_date": "2024-09-04",
        "relative_date": "last Wednesday",
        "confidence": 0.95,
        "supersedes_hint": null
      }
    ]}

  Field rules:
  1. text — a single declarative statement about the USER, with pronouns
     resolved ("user", not "I"). One fact per observation. Skip assistant
     utterances, questions, hypotheticals, jokes, and acknowledgments.

     SKIP low-value chat noise. Do NOT emit observations for status /
     location queries ("what's the status?", "where are you?"),
     acknowledgments ("ok", "thanks", "got it"), pleasantries, process
     talk ("let me run that", "give me a sec"), tool self-reports
     ("build succeeded"), or repeated phrasings of the same fact within
     the session. If a turn contains ONLY this kind of content, return
     {"observations": []} for that turn.

     EXTRACT EVERY ATOMIC FACT that IS substantive. Process each user
     turn independently and emit one observation for EACH fact, including
     each event, duration, count, entity, preference, and state-change
     separately. Do not skip a fact just because the conversation moved
     past it.
  2. observation_date — copy the session_date from the input. ISO-8601 date.
  3. referenced_date — the calendar date the fact is ABOUT, resolved from
     session_date and any relative phrasing. ISO-8601. NULL when timeless.
  4. relative_date — the literal phrasing the user used ("yesterday",
     "last Thursday"). NULL when no relative phrasing was used.
  5. confidence — 0.95 for explicit user statements, 0.7 for clear
     inferences, < 0.6 means do not emit.
  6. supersedes_hint — short string of any contradicted earlier statement
     in the SAME session, otherwise null.

  Edge cases:
  - No extractable user facts → {"observations": []}
  - Ambiguous relative phrase ("a while back") → referenced_date=null, copy
    phrase into relative_date.
  - Future-dated fact ("flight next Tuesday") → referenced_date is the
    resolved future date.
  - Same-session contradictions → emit both, set supersedes_hint on later.

  Output JSON ONLY. No markdown. No prose.
